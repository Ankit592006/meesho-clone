<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Meesho Clone</title>
    <link rel="icon" href="../../assets/icon.png">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/navbar.css">
    <link rel="stylesheet" href="../../css/footer.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <link rel="stylesheet" href="../../css/cart.css">

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2category?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        body {
            background-color: #fdf8fb;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }

        .signup-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 100px);
            padding-top: 120px;
            padding-bottom: 50px;
        }

        .signup-card {
            width: 440px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(159, 32, 137, 0.06);
            overflow: hidden;
            border: 1px solid #f2e6f2;
        }

        /* Graphic on top of SignUp Card */
        .signup-graphic {
            background: rgb(240, 233, 255);
            padding: 30px;
            text-align: center;
            position: relative;
            background-image: linear-gradient(135deg, rgb(253, 238, 250) 0%, rgb(240, 233, 255) 100%);
        }

        .signup-graphic h2 {
            font-size: 26px;
            font-weight: 700;
            color: rgb(88, 10, 70);
            margin-bottom: 5px;
        }

        .signup-graphic p {
            font-size: 16px;
            font-weight: 500;
            color: rgb(159, 32, 137);
            margin: 0;
        }

        .signup-illustration {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .illus-box {
            background: #ffffff;
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            width: 75px;
            height: 95px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: #555;
        }

        .illus-box img {
            width: 100%;
            height: 65px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 4px;
        }

        /* Form styling */
        .signup-form-body {
            padding: 40px 35px 30px;
        }

        .signup-form-body h3 {
            font-size: 20px;
            font-weight: 600;
            color: #353543;
            margin-bottom: 30px;
        }

        .form-group-custom {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group-custom label {
            font-size: 12px;
            color: #8b8ba3;
            font-weight: 500;
            display: block;
            margin-bottom: 5px;
        }

        .input-row {
            display: flex;
            align-items: center;
            border-bottom: 1.5px solid #cecede;
            padding-bottom: 8px;
            transition: border-color 0.2s;
        }

        .input-row:focus-within {
            border-color: rgb(159, 32, 137);
        }

        .country-prefix {
            font-size: 16px;
            font-weight: 500;
            color: #353543;
            margin-right: 15px;
            border-right: 1px solid #cecede;
            padding-right: 15px;
        }

        .phone-input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 16px;
            font-weight: 500;
            color: #353543;
            background: transparent;
        }

        .phone-input::placeholder {
            color: #b5b5c8;
        }

        .continue-btn {
            width: 100%;
            padding: 14px;
            border: none;
            background: rgb(159, 32, 137);
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 12px rgba(159, 32, 137, 0.15);
            transition: background 0.2s;
        }

        .continue-btn:hover {
            background: rgb(130, 20, 110);
        }

        .signup-error-msg {
            color: #e53e3e;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .signup-footer-text {
            font-size: 11px;
            color: #8b8ba3;
            text-align: center;
            line-height: 1.6;
            margin-top: 30px;
        }

        .signup-footer-text a {
            color: rgb(159, 32, 137);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <!-- ================= HEADER START ================= -->
    <div class="full-nav">
        <div class="outer">
            <div class="logo-title">
                <a href="../../index.html"><img src="../../assets/meeshoLogo.svg" alt=""></a>
            </div>
            <div class="search-title">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Try Saree, Kurti or Search By" disabled>
            </div>
            <div class="icons">
                <p>Become a supplier</p>
                <div class="line"></div>
                <p>Investors relations</p>
                <div class="line"></div>
                <div class="user">
                    <i class="fa-solid fa-user"></i>
                    <p>Profile</p>
                </div>
                <div class="user">
                    <i class="fa-solid fa-cart-plus"></i>
                    <p>Cart</p>
                </div>
            </div>
        </div>
        <div class="mid-line"></div>
    </div>
    <!-- ================= HEADER END ================= -->

    <!-- ================= SIGN UP CARD START ================= -->
    <div class="signup-container">
        <div class="signup-card">
            <!-- Header Banner Illustration -->
            <div class="signup-graphic">
                <h2>Great Quality</h2>
                <p>Lowest prices</p>
                <div class="signup-illustration">
                    <div class="illus-box">
                        <img src="../../assets/img3.webp" alt="Kurti">
                        <span>Sarees</span>
                    </div>
                    <div class="illus-box">
                        <img src="../../assets/img4.webp" alt="Shirt">
                        <span>Kurtis</span>
                    </div>
                    <div class="illus-box">
                        <img src="../../assets/img19.webp" alt="Jewellery">
                        <span>Suits</span>
                    </div>
                </div>
            </div>

            <!-- Form Body -->
            <div class="signup-form-body">
                <h3>Sign Up to view your profile</h3>
                
                <div class="form-group-custom">
                    <label>Country</label>
                    <div class="input-row">
                        <span class="country-prefix">IN +91</span>
                        <input type="tel" id="signupPhone" class="phone-input" placeholder="Enter Phone Number" maxlength="10">
                    </div>
                    <div id="phoneError" class="signup-error-msg">Please enter a valid 10-digit mobile number.</div>
                </div>

                <button class="continue-btn" id="continueSignupBtn">Continue</button>

                <div class="signup-footer-text">
                    By continuing, you agree to Meesho's
                    <br>
                    <a href="">Terms & Conditions</a> and <a href="">Privacy Policy</a>
                </div>
            </div>
        </div>
    </div>
    <!-- ================= SIGN UP CARD END ================= -->

    <!-- ================= CART DRAWER ================= -->
    <div id="cartBackdrop" class="cart-backdrop"></div>
    <div id="cartDrawer" class="cart-drawer"></div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../js/components/cart-drawer.js"></script>
    <!-- Components -->
    <script src="../../js/components/navbar.js"></script>
    <!-- Auth script -->
    <script src="../../js/auth.js"></script>
</body>

</html>
